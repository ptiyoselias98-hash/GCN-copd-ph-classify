# Conda environment for the COPD-PH GCN project (Round 3 snapshot, 2026-04-23).
# Two environments are used:
#   - `pulmonary_bv5_py39` on the remote IMSS GPU node (training + cache build)
#   - local Windows Python 3.14 (analysis scripts + lung v2 extractor)
# This file pins the remote training env; the local scripts use the
# `requirements-local.txt` alongside.
name: pulmonary_bv5_py39
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults
dependencies:
  # VERIFIED 2026-04-24 via `pip show` on remote pulmonary_bv5_py39
  - python=3.9
  - pip
  - numpy
  - scipy
  - pandas
  - tqdm
  - networkx
  - pip:
      # verified from requirements-remote.lock.txt (full pip freeze is in that file)
      - torch==2.6.0
      - torchvision==0.16.0
      - torch-geometric==2.6.1
      - kimimaro==5.8.1
      - connected-components-3d==3.26.1
      - nibabel==5.4.2
      - scikit-learn==1.5.2
      - matplotlib==3.9.1
