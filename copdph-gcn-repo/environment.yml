# Conda environment for the COPD-PH GCN project (Round 3 snapshot, 2026-04-23).
# Two environments are used:
#   - `pulmonary_bv5_py39` on the remote IMSS GPU node (training + cache build)
#   - local Windows Python 3.14 (analysis scripts + lung v2 extractor)
# This file pins the remote training env; the local scripts use the
# `requirements-local.txt` alongside.
name: pulmonary_bv5_py39
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults
dependencies:
  - python=3.9
  - pip
  - pytorch=2.2.*
  - torchvision=0.17.*
  - pytorch-cuda=11.8
  - numpy=1.24.*
  - scipy=1.11.*
  - scikit-learn=1.3.*
  - pandas=2.0.*
  - nibabel=5.1.*
  - matplotlib=3.7.*
  - tqdm
  - networkx=3.1.*
  - pip:
      - torch-geometric==2.5.2
      - torch-scatter==2.1.2
      - torch-sparse==0.6.18
      - kimimaro==4.0.4           # cache builder — exact version TBD from remote pip show
      - connected-components-3d==3.14.*
      - cloud-volume==10.1.*
